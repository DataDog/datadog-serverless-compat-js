name: Publish packages on NPM

on:
  workflow_dispatch:
    inputs:
      publish-package:
        description: "Build or Build and Publish?"
        required: true
        type: choice
        default: "Build"
        options:
          - "Build"
          - "Build and Publish"
      package-version-override:
        description: "Package version override (optional, x.y.z)"
        required: false
        type: string
        default: ""

permissions: {}

jobs:
  downloadbinaries:
    runs-on: ubuntu-latest
    outputs:
      package-version: ${{ steps.package.outputs.package-version }}
      serverless-compat-version: ${{ steps.serverless-compat-binary.outputs.serverless-compat-version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - id: package
        run: |
          if [[ -n "${{ github.event.inputs.package-version-override }}" ]]; then
            PACKAGE_VERSION="${{ github.event.inputs.package-version-override }}"
          else
            if [[ ! "$GITHUB_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
              echo "Invalid tag format: $GITHUB_REF, must be in the form vMAJOR.MINOR.PATCH"
              exit 1
            fi
            PACKAGE_VERSION="${GITHUB_REF#refs/tags/v}"
          fi

          echo "package-version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
      - id: serverless-compat-binary
        run: |
          RESPONSE=$(curl -s "https://api.github.com/repos/datadog/serverless-components/releases")
          SERVERLESS_COMPAT_VERSION=$(echo "$RESPONSE" | jq -r --arg pattern "datadog-serverless-compat\/v[0-9]*\.[0-9]*\.[0-9]*" '.[] | select(.tag_name | test($pattern)) | .tag_name' | sort -V | tail -n 1)

          echo "Using version ${SERVERLESS_COMPAT_VERSION} of Serverless Compatibility Layer binary"
          echo "serverless-compat-version=$(echo "$SERVERLESS_COMPAT_VERSION" | jq -rR 'ltrimstr("sls-")')" >> "$GITHUB_OUTPUT"

          curl --output-dir ./temp/ --create-dirs -O -s -L "https://github.com/DataDog/serverless-components/releases/download/${SERVERLESS_COMPAT_VERSION}/datadog-serverless-compat.zip"
          unzip ./temp/datadog-serverless-compat.zip -d ./
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: bin
          path: bin
  build:
    runs-on: ubuntu-latest
    needs: [downloadbinaries]
    env:
      PACKAGE_VERSION: ${{ needs.downloadbinaries.outputs.package-version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "18.x"
      - name: Copy binaries into platform packages
        run: |
          mkdir -p packages/linux-x64/bin packages/linux-arm64/bin packages/win32-x64/bin
          cp bin/linux-amd64/datadog-serverless-compat packages/linux-x64/bin/
          cp bin/linux-arm64/datadog-serverless-compat packages/linux-arm64/bin/
          cp bin/windows-amd64/datadog-serverless-compat.exe packages/win32-x64/bin/
      - run: yarn version ${{ env.PACKAGE_VERSION }}
      - run: yarn
      - run: yarn prebuild
      - run: yarn build
      - run: yarn pack
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: package
          path: package.tgz
  publish:
    if: ${{ github.event.inputs.publish-package == 'Build and Publish' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    needs: [downloadbinaries]
    env:
      PACKAGE_VERSION: ${{ needs.downloadbinaries.outputs.package-version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "18.x"
      - name: Copy binaries into platform packages
        run: |
          mkdir -p packages/linux-x64/bin packages/linux-arm64/bin packages/win32-x64/bin
          cp bin/linux-amd64/datadog-serverless-compat packages/linux-x64/bin/
          cp bin/linux-arm64/datadog-serverless-compat packages/linux-arm64/bin/
          cp bin/windows-amd64/datadog-serverless-compat.exe packages/win32-x64/bin/
      - name: Set platform package versions and update optionalDependencies
        run: |
          for pkg in linux-x64 linux-arm64 win32-x64; do
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('packages/${pkg}/package.json', 'utf8'));
              p.version = process.env.PACKAGE_VERSION;
              fs.writeFileSync('packages/${pkg}/package.json', JSON.stringify(p, null, 2) + '\n');
            "
          done
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const v = process.env.PACKAGE_VERSION;
            p.optionalDependencies['@datadog/serverless-compat-linux-x64'] = v;
            p.optionalDependencies['@datadog/serverless-compat-linux-arm64'] = v;
            p.optionalDependencies['@datadog/serverless-compat-win32-x64'] = v;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
      - name: Publish platform packages
        run: |
          cd packages/linux-x64 && yarn npm publish && cd ../..
          cd packages/linux-arm64 && yarn npm publish && cd ../..
          cd packages/win32-x64 && yarn npm publish && cd ../..
      - run: yarn version ${{ env.PACKAGE_VERSION }}
      - run: yarn
      - run: yarn prebuild
      - run: yarn build
      - run: yarn npm publish
  release:
    if: ${{ github.event.inputs.publish-package == 'Build and Publish' }}
    runs-on: ubuntu-latest
    needs: [downloadbinaries, build, publish]
    permissions:
      contents: write
    env:
      PACKAGE_VERSION: ${{ needs.downloadbinaries.outputs.package-version }}
      SERVERLESS_COMPAT_VERSION: ${{ needs.downloadbinaries.outputs.serverless-compat-version }}
    steps:
      - uses: softprops/action-gh-release@01570a1f39cb168c169c802c3bceb9e93fb10974 # v2.1.0
        with:
          body: "Uses [${{ env.SERVERLESS_COMPAT_VERSION }}](https://github.com/DataDog/serverless-components/releases/tag/${{ env.SERVERLESS_COMPAT_VERSION }}) of the Serverless Compatibility Layer binary."
          draft: true
          tag_name: "v${{ env.PACKAGE_VERSION }}"
          generate_release_notes: true
          make_latest: true
