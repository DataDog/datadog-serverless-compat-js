name: Publish packages on NPM

on:
  workflow_dispatch:
    inputs:
      publish-package:
        description: "Build or Build and Publish?"
        required: true
        type: choice
        default: "Build"
        options:
          - "Build"
          - "Build and Publish"
      package-version:
        description: "Package version override (x.y.z) — defaults to the latest published version of the platform-specific packages"
        required: false
        type: string

permissions: {}

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve package version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.package-version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(npm view @datadog/serverless-compat-linux-x64 version)
          fi
          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: [resolve-version]
    env:
      PACKAGE_VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "18.x"
      - name: Update optionalDependencies to match package version
        run: node scripts/update-optional-deps.js "$PACKAGE_VERSION"
      - run: yarn version $PACKAGE_VERSION
      - run: yarn
      - run: yarn prebuild
      - run: yarn build
      - run: yarn pack
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: package
          path: package.tgz

  publish:
    if: ${{ github.event.inputs.publish-package == 'Build and Publish' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    needs: [build]
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: package
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "18.x"
      - run: npm publish package.tgz

  release:
    if: ${{ github.event.inputs.publish-package == 'Build and Publish' }}
    runs-on: ubuntu-latest
    needs: [resolve-version, publish]
    permissions:
      contents: write
    env:
      PACKAGE_VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: softprops/action-gh-release@01570a1f39cb168c169c802c3bceb9e93fb10974 # v2.1.0
        with:
          draft: true
          tag_name: "v${{ env.PACKAGE_VERSION }}"
          generate_release_notes: true
          make_latest: true
